<div class="relative inline-block text-left z-10" #selectLang>
  <button
    type="button"
    (click)="toggleDropdown()"
    class="inline-flex items-center justify-center px-4 py-2 text-sm font-medium text-gray-200 bg-neutral-800 rounded-md hover:bg-neutral-700 focus:outline-none"
    appClickOutside
    [clickOutsideExceptions]="[selectLang]"
    (clickOutside)="onClose()"
  >
    <span class="mr-2">{{ getCurrentLangLabel() }}</span>
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M19 9l-7 7-7-7"
      />
    </svg>
  </button>

  <div
    *ngIf="isOpen"
    class="absolute right-0 mt-2 w-48 rounded-md shadow-lg bg-neutral-800 overflow-hidden"
  >
    <div role="menu">
      <button
        *ngFor="let lang of languages"
        (click)="selectLanguage(lang.code)"
        class="w-full text-left px-4 py-2 text-sm text-gray-200 hover:bg-neutral-700 flex items-center"
        [class.bg-neutral-700]="currentLang === lang.code"
      >
        {{ lang.label }}
      </button>
    </div>
  </div>
</div>
