<div class="overflow-y-auto">
  <div
    *ngIf="!notifications?.length"
    class="flex flex-col items-center justify-center h-64"
  >
    <i class="fas fa-bell text-4xl text-gray-500 mb-4"></i>
    <p class="text-gray-500">No notifications yet</p>
  </div>

  <!-- Notification Items -->
  <div
    *ngFor="let notification of notifications"
    class="p-4 border-b border-neutral-800 hover:bg-neutral-800 transition-colors cursor-pointer"
  >
    <!-- Notification Content -->
    <div class="flex items-start gap-3">
      <!-- Icon based on type -->
      <div class="mt-1" [ngSwitch]="notification.type">
        <i
          *ngSwitchCase="'success'"
          class="fas fa-check-circle text-green-500"
        ></i>
        <i
          *ngSwitchCase="'warning'"
          class="fas fa-exclamation-circle text-yellow-500"
        ></i>
        <i *ngSwitchCase="'error'" class="fas fa-times-circle text-red-500"></i>
        <i *ngSwitchCase="'info'" class="fas fa-info-circle text-blue-500"></i>
      </div>

      <!-- Content -->
      <div class="flex-1">
        <p class="text-sm text-gray-200 font-medium mb-1">
          {{ notification.title }}
        </p>
        <p class="text-sm text-gray-400">
          {{ notification.message }}
        </p>
        <span class="text-xs text-gray-500 mt-2 block">
          {{ notification.timestamp | date : "MMM d, h:mm a" }}
        </span>
      </div>

      @if(!notification.read) {
      <div class="relative flex size-3">
        <span
          class="absolute inline-flex h-full w-full animate-ping rounded-full bg-sky-400 opacity-75"
        ></span>
        <span
          class="relative inline-flex size-3 rounded-full bg-sky-500"
        ></span>
      </div>
      }
    </div>
  </div>
</div>

<!-- Footer Actions -->
<div
  class="absolute bottom-0 left-0 right-0 p-4 border-t border-neutral-800 bg-neutral-900"
>
  <button
    *ngIf="notifications?.length"
    (click)="markAllAsRead()"
    class="w-full py-2 px-4 bg-neutral-800 hover:bg-neutral-700 text-gray-200 rounded-lg transition-colors"
  >
    Mark all as read
  </button>
</div>
