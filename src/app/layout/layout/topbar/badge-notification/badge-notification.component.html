<button
  class="relative inline-flex items-center justify-center px-4 py-2 text-sm font-medium text-gray-200 rounded-md hover:bg-neutral-700 focus:outline-none transition-all"
  type="button"
  (click)="setVisible()"
>
  <!-- <p-overlay-badge [value]="notiAlertLength" [severity]="'info'">
  </p-overlay-badge> -->
  <!-- <p class="absolute top-0 right-10">{{  }}</p> -->
  <div class="absolute top-1 left-8">
    <span class="relative flex size-5">
      <span
        class="absolute inline-flex h-full w-full animate-ping rounded-full bg-blue-600 opacity-75"
      ></span>
      <span
        class="relative inline-flex justify-center items-center size-5 rounded-full bg-blue-600"
        >{{ notiAlertLength }}</span
      >
    </span>
  </div>
  <svg
    xmlns="http://www.w3.org/2000/svg"
    fill="none"
    viewBox="0 0 24 24"
    stroke-width="1.5"
    stroke="currentColor"
    class="size-7"
  >
    <path
      stroke-linecap="round"
      stroke-linejoin="round"
      d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0"
    />
  </svg>
</button>
<p-drawer
  [header]="'NOTIFY.TITLE' | translate"
  [(visible)]="isVisible"
  position="right"
>
  <app-drawer-notification></app-drawer-notification>
</p-drawer>
