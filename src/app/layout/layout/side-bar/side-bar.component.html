<div class="flex gap-4">
  <!-- Logo Section -->
  <h1 class="text-xl font-bold text-blue-500">Logo</h1>

  <!-- Navigation Menu -->
  <div class="flex px-1 space-y-1">
    <ng-container *ngFor="let item of menuItems">
      <a
        [routerLink]="item.route"
        class="flex items-center px-2 py-3 hover:border-b-1 hover:text-blue-300 text-gray-400 border-blue-300"
        [routerLinkActive]="'border-b-1 border-blue-500 text-blue-500'"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <!-- <fa-icon [icon]="item.icon"></fa-icon> -->
        {{ item.label | translate }}
      </a>
    </ng-container>
  </div>
</div>
