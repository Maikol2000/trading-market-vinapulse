<div class="bg-white py-8 px-4 shadow sm:rounded-lg sm:px-10">
  <app-select-lang></app-select-lang>
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
    <div>
      <label for="email" class="block text-sm font-medium text-gray-700">
        {{ "AUTH.EMAIL" | translate }}
      </label>
      <div class="mt-1">
        <input
          id="email"
          name="email"
          type="email"
          formControlName="email"
          autocomplete="email"
          required
          class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
          placeholder="email@example.com"
        />
      </div>
      <div
        *ngIf="
          loginForm.get('email')?.invalid && loginForm.get('email')?.touched
        "
        class="text-red-500 text-xs mt-1"
      >
        {{ "AUTH.ERROR.INVALID_EMAIL" | translate }}
      </div>
    </div>

    <div>
      <label for="password" class="block text-sm font-medium text-gray-700">
        {{ "AUTH.PASSWORD" | translate }}
      </label>
      <div class="mt-1">
        <input
          id="password"
          name="password"
          type="password"
          formControlName="password"
          autocomplete="current-password"
          required
          class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
          placeholder="••••••••"
        />
      </div>
      <div
        *ngIf="
          loginForm.get('password')?.invalid &&
          loginForm.get('password')?.touched
        "
        class="text-red-500 text-xs mt-1"
      >
        {{ "AUTH.ERROR.PASSWORD_ERROR" | translate }}
      </div>
    </div>

    <div class="flex items-center justify-between">
      <!-- <div class="flex items-center">
        <input
          id="remember-me"
          name="remember-me"
          type="checkbox"
          class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded"
        />
        <label for="remember-me" class="ml-2 block text-sm text-gray-900">
          {{ "AUTH.REMEMBER_ME" | translate }}
        </label>
      </div> -->

      <div class="text-sm">
        <a href="#" class="font-medium text-blue-600 hover:text-blue-500">
          {{ "AUTH.FORGOT_PASSWORD" | translate }}
        </a>
      </div>
    </div>

    <div>
      <button
        type="submit"
        [disabled]="loginForm.invalid"
        class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50 cursor-pointer"
      >
        {{ "AUTH.LOGIN" | translate }}
      </button>
    </div>
  </form>

  <div class="mt-6">
    <div class="relative">
      <div class="absolute inset-0 flex items-center">
        <div class="w-full border-t border-gray-300"></div>
      </div>
      <div class="relative flex justify-center text-sm">
        <span class="px-2 bg-white text-gray-500">
          {{ "AUTH.OR_LOGIN_WITH" | translate }}
        </span>
      </div>
    </div>

    <div class="mt-3">
      <button
        (click)="signInWithGoogle()"
        class="w-full inline-flex justify-center py-2 px-4 border border-gray-300 rounded-md shadow-sm bg-white text-sm font-medium text-gray-500 hover:bg-gray-50"
      >
        <span class="sr-only">{{ "AUTH.LOGIN_WITH_GOOGLE" | translate }}</span>
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 32 32"
          data-name="Layer Google"
          class="w-5"
        >
          <path
            d="M23.75,16A7.7446,7.7446,0,0,1,8.7177,18.6259L4.2849,22.1721A13.244,13.244,0,0,0,29.25,16"
            fill="#00ac47"
          />
          <path
            d="M23.75,16a7.7387,7.7387,0,0,1-3.2516,6.2987l4.3824,3.5059A13.2042,13.2042,0,0,0,29.25,16"
            fill="#4285f4"
          />
          <path
            d="M8.25,16a7.698,7.698,0,0,1,.4677-2.6259L4.2849,9.8279a13.177,13.177,0,0,0,0,12.3442l4.4328-3.5462A7.698,7.698,0,0,1,8.25,16Z"
            fill="#ffba00"
          />
          <polygon
            fill="#2ab2db"
            points="8.718 13.374 8.718 13.374 8.718 13.374 8.718 13.374"
          />
          <path
            d="M16,8.25a7.699,7.699,0,0,1,4.558,1.4958l4.06-3.7893A13.2152,13.2152,0,0,0,4.2849,9.8279l4.4328,3.5462A7.756,7.756,0,0,1,16,8.25Z"
            fill="#ea4435"
          />
          <polygon
            fill="#2ab2db"
            points="8.718 18.626 8.718 18.626 8.718 18.626 8.718 18.626"
          />
          <path
            d="M29.25,15v1L27,19.5H16.5V14H28.25A1,1,0,0,1,29.25,15Z"
            fill="#4285f4"
          />
        </svg>
      </button>
    </div>
  </div>

  <div class="mt-6 text-center">
    <p class="text-sm text-gray-600">
      {{ "AUTH.NO_ACCOUNT" | translate }}
      <button
        (click)="navigate()"
        class="font-medium text-blue-600 hover:text-blue-500"
      >
        {{ "AUTH.REGISTER_NOW" | translate }}
      </button>
    </p>
  </div>
</div>
