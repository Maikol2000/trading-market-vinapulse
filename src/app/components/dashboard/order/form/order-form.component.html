<div class="bg-neutral-900 p-4 sm:p-6 lg:px-8 rounded-lg shadow-md h-full">
  <h2 class="mb-4">{{ "ORDER.FORM.TITLE" | translate }}</h2>

  <!-- Order Form -->
  <form [formGroup]="orderForm" (ngSubmit)="submitOrder()" class="space-y-4">
    <!-- Order Side (Buy/Sell) - Switch Button -->
    <div>
      <!-- <label
        class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
        >Side</label
      > -->
      <div class="flex w-full rounded-lg overflow-hidden">
        <button
          type="button"
          [ngClass]="{
            'bg-green-500 text-white': orderForm.get('side')?.value === 'buy',
            'bg-gray-600 text-gray-400 ': orderForm.get('side')?.value !== 'buy'
          }"
          class="flex-1 py-3 font-medium transition-colors duration-200 ease-in-out focus:outline-none"
          (click)="orderForm.get('side')?.setValue('buy')"
        >
          {{ "COMMONS.BUY" | translate }}
        </button>
        <button
          type="button"
          [ngClass]="{
            'bg-red-500 text-white': orderForm.get('side')?.value === 'sell',
            'bg-gray-600 text-gray-400 ':
              orderForm.get('side')?.value !== 'sell'
          }"
          class="flex-1 py-3 font-medium transition-colors duration-200 ease-in-out focus:outline-none"
          (click)="orderForm.get('side')?.setValue('sell')"
        >
          {{ "COMMONS.SELL" | translate }}
        </button>
      </div>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <!-- Order Type -->
      <!-- <div>
        <label
          class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
          >{{ "ORDER.FORM.FIELDS.ORDER_TYPE" | translate }}</label
        >
        <select
          formControlName="orderType"
          class="w-full px-3 bg-white py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        >
          <option *ngFor="let type of orderTypes" [value]="type">
            {{ type | titlecase }}
          </option>
        </select>
      </div> -->

      <!-- Quantity -->
      <div>
        <label
          class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
          >{{ "ORDER.FORM.FIELDS.QUANTITY" | translate }}</label
        >
        <input
          type="number"
          formControlName="quantity"
          step="0.0001"
          min="0.0001"
          class="w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        />
        <div
          *ngIf="
            orderForm.get('quantity')?.invalid &&
            orderForm.get('quantity')?.touched
          "
          class="text-red-500 text-sm mt-1"
        >
          {{ "ORDER.FORM.FIELDS.QUANTITY_ERROR" | translate }}
        </div>
      </div>

      <!-- Price -->
      <div>
        <label
          class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
        >
          {{ "ORDER.FORM.FIELDS.PRICE" | translate }}</label
        >
        <input
          type="number"
          formControlName="price"
          step="0.01"
          min="0"
          class="w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        />
        <div
          *ngIf="
            orderForm.get('price')?.invalid && orderForm.get('price')?.touched
          "
          class="text-red-500 text-sm mt-1"
        >
          {{ "ORDER.FORM.FIELDS.PRICE_ERROR" | translate }}
        </div>
      </div>
      <!-- Order Total (calculated) -->
      <div class="bg-gray-50 dark:bg-gray-700 p-4 rounded-lg">
        <div class="flex justify-between items-center">
          <span class="text-gray-300">{{
            "ORDER.FORM.FIELDS.TOTAL_FEE" | translate
          }}</span>
          <span class="text-lg font-bold text-gray-900 dark:text-white">
            {{
              orderForm.get("quantity")?.value * orderForm.get("price")?.value
                | currency : "USD" : "symbol" : "1.2-2"
            }}
          </span>
        </div>
      </div>
    </div>

    <!-- Submit Button -->
    <button
      type="submit"
      [disabled]="orderForm.invalid"
      [ngClass]="{
        'bg-green-600 hover:bg-green-700':
          orderForm.get('side')?.value === 'buy',
        'bg-red-600 hover:bg-red-700': orderForm.get('side')?.value === 'sell'
      }"
      class="w-full px-6 py-3 border border-transparent text-base font-medium rounded-md shadow-sm text-white focus:outline-none focus:ring-2 focus:ring-offset-2 transition-colors duration-200"
    >
      {{
        "COMMONS." + (orderForm.get("side")?.value === "buy" ? "BUY" : "SELL")
          | translate
      }}
      {{ selectedSymbol.split("-")[0] }}
    </button>
  </form>
</div>
