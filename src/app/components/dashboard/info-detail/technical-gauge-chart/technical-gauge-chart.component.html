<div>
  <highcharts-chart
    [Highcharts]="highcharts"
    [options]="chartOptions"
    style="width: 100%; height: 300px; display: block"
  ></highcharts-chart>

  <div class="text-center font-semibold text-xl text-blue-600 mt-2">Buy</div>

  <div class="flex justify-around mt-4">
    <div class="text-center">
      <div class="text-red-500 font-semibold">Sell</div>
      <div>{{ signalCount.sell }}</div>
    </div>
    <div class="text-center">
      <div class="text-purple-500 font-semibold">Neutral</div>
      <div>{{ signalCount.neutral }}</div>
    </div>
    <div class="text-center">
      <div class="text-blue-500 font-semibold">Buy</div>
      <div>{{ signalCount.buy }}</div>
    </div>
  </div>

  <div class="mt-6">
    <h3 class="font-bold mb-2">Technical Indicators</h3>
    <div *ngFor="let i of indicators" class="flex justify-between">
      <div>{{ i.name }}</div>
      <div
        [ngClass]="{
          'text-blue-600': i.signal === 'Buy',
          'text-purple-500': i.signal === 'Neutral',
          'text-red-500': i.signal === 'Sell'
        }"
      >
        {{ i.signal }}
      </div>
    </div>
  </div>
</div>
