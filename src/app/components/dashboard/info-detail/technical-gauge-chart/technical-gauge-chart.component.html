<div>
  <div class="text-center font-semibold text-xl text-blue-600 mt-2"></div>
  <div class="flex justify-center py-2">
    <dx-circular-gauge
      [value]="gaugeValue()"
      [loadingIndicator]="{ show: true }"
      [subvalues]="[]"
    >
      <!-- Scale Configuration -->
      <dxo-scale [startValue]="0" [endValue]="100" [tickInterval]="10">
        <dxo-label [customizeText]="customizeText">
          <dxo-font [size]="14"></dxo-font>
        </dxo-label>
      </dxo-scale>
      <!-- Range Container -->
      <dxo-range-container>
        <dxi-range [startValue]="0" [endValue]="30" color="#DF5353">
        </dxi-range>
        <dxi-range [startValue]="30" [endValue]="70" color="#DDDF0D">
        </dxi-range>
        <dxi-range [startValue]="70" [endValue]="100" color="#55BF3B">
        </dxi-range>
      </dxo-range-container>

      <!-- Title Configuration -->
      <dxo-title text="RSI Technical Analysis">
        <dxo-font [size]="28" color="white"></dxo-font>
      </dxo-title>

      <!-- Needle -->
      <dxo-value-indicator type="triangleNeedle" color="#9b9b9b">
      </dxo-value-indicator>
    </dx-circular-gauge>
  </div>

  <div class="mt-6">
    <h3 class="font-bold mb-2">
      {{ "CRYPTO.DETAIL.TECHNICAL_INDICATOR" | translate }}
    </h3>
    <div
      *ngFor="let i of indicators"
      class="flex justify-between text-gray-400"
    >
      <p>{{ i.name }}</p>
      <p
        [ngClass]="{
          'text-blue-600': i.signal === 'Mua',
          'text-gray-400': i.signal === 'Trung lập',
          'text-red-500': i.signal === 'Bán'
        }"
      >
        {{ i.signal }}
      </p>
    </div>
  </div>
</div>
