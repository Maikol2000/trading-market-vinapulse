<div>
  <div class="text-center font-semibold text-xl text-blue-600 mt-2"></div>
  <div class="flex justify-center py-2 bg-white">
    <ngx-gauge
      [value]="gaugeValue()"
      [label]="gaugeLabel()"
      [append]="gaugeAppendText"
      [thick]="gaugeThick"
      [size]="gaugeSize"
      [animate]="gaugeOptions.animation"
      [duration]="gaugeOptions.animationDuration"
      class="text-gray-400 p-2"
      [type]="gaugeType"
      [foregroundColor]="gaugeForegroundColor()"
      [markers]="thresholds"
    >
    </ngx-gauge>
  </div>

  <div class="mt-6">
    <h3 class="font-bold mb-2">
      {{ "CRYPTO.DETAIL.TECHNICAL_INDICATOR" | translate }}
    </h3>
    <div
      *ngFor="let i of indicators"
      class="flex justify-between text-gray-400"
    >
      <p>{{ i.name }}</p>
      <p
        [ngClass]="{
          'text-blue-600': i.signal === 'Mua',
          'text-gray-400': i.signal === 'Trung lập',
          'text-red-500': i.signal === 'Bán'
        }"
      >
        {{ i.signal }}
      </p>
    </div>
  </div>
</div>
