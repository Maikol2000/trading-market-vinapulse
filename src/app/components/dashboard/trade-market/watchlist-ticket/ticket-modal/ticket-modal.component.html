<app-modal [isOpen]="true" title="Instruments">
  <!-- Search Bar -->
  <div class="mb-4">
    <div class="relative">
      <input
        [formControl]="searchControl"
        type="text"
        class="w-full px-4 py-2 pl-10 text-sm bg-neutral-800 border border-neutral-700 rounded-lg focus:outline-none focus:border-blue-500 text-gray-200"
        placeholder="Search instruments..."
      />
      <fa-icon
        [icon]="faSearch"
        class="absolute left-3 top-2.5 text-gray-400"
      ></fa-icon>
    </div>
  </div>

  <!-- Instruments List -->
  <div class="mt-2 max-h-[400px] overflow-y-auto">
    <div class="space-y-1">
      <button
        *ngFor="let instrument of filteredInstruments()"
        (click)="onInstrumentSelect(instrument)"
        class="w-full p-3 text-left hover:bg-neutral-700 rounded-lg transition-colors duration-200"
      >
        <div class="flex items-center justify-between">
          <div class="text-gray-200 font-medium">
            {{ instrument.symbol }}
          </div>
          <div class="text-gray-400 text-sm">
            {{ instrument.name }}
          </div>
          <!-- <div
            class="text-xs font-medium uppercase px-2 py-1 rounded"
            [ngClass]="{
              'bg-blue-500/20 text-blue-400': instrument.category === 'crypto',
              'bg-green-500/20 text-green-400': instrument.category === 'stock',
              'bg-yellow-500/20 text-yellow-400':
                instrument.category === 'forex'
            }"
          >
            {{ instrument.category }}
          </div> -->
        </div>
      </button>
    </div>
  </div>
</app-modal>
