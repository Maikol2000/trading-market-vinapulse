<div
  class="bg-neutral-900 p-4 sm:p-6 lg:px-8 rounded-lg shadow-md text-gray-200"
>
  <!-- <h2 class="mb-4">
    {{ "TRADE.WATCHLIST.TITLE" | translate }}
  </h2> -->
  <div class="flex justify-between mb-4">
    <div class="flex space-x-4">
      <button
        (click)="setActiveTab('open')"
        [class.bg-yellow-500]="activeTab() === 'open'"
        [class.text-black]="activeTab() === 'open'"
        [class.bg-gray-700]="activeTab() !== 'open'"
        class="px-4 py-2 rounded"
      >
        Mở
      </button>
      <button
        (click)="setActiveTab('closed')"
        [class.bg-yellow-500]="activeTab() === 'closed'"
        [class.text-black]="activeTab() === 'closed'"
        [class.bg-gray-700]="activeTab() !== 'closed'"
        class="px-4 py-2 rounded"
      >
        Đã đóng
      </button>
      <button
        (click)="setActiveTab('pending')"
        [class.bg-yellow-500]="activeTab() === 'pending'"
        [class.text-black]="activeTab() === 'pending'"
        [class.bg-gray-700]="activeTab() !== 'pending'"
        class="px-4 py-2 rounded"
      >
        Đang chờ
      </button>
    </div>
  </div>
  <div class="overflow-x-auto">
    <table class="min-w-full">
      <thead>
        <tr class="bg-gray-800">
          @for (header of headers; track $index) {
          <th class="p-2 text-left">
            {{ header.label | translate }}
          </th>
          }
        </tr>
      </thead>
      <tbody>
        <tr
          *ngFor="let order of filteredOrders"
          class="border-b border-gray-700 hover:bg-gray-800"
        >
          <td class="p-2">
            {{ order.symtal }}
          </td>
          <td class="p-2">
            <span
              [ngClass]="{
                'text-red-500': order.type === 'Sell',
                'text-blue-500': order.type === 'Buy'
              }"
            >
              {{ order.type }}
            </span>
          </td>
          <td class="p-2 text-left">{{ order.quantity }}</td>

          <td class="p-2">
            {{ order.closePrice ? (order.closePrice | number : "1.2-2") : "-" }}
          </td>
          <td
            class="p-2"
            [ngClass]="{
              'text-green-500': order.profitLoss >= 0,
              'text-red-500': order.profitLoss < 0
            }"
          >
            {{ order.profitLoss >= 0 ? "+" : ""
            }}{{ order.profitLoss | number : "1.2-2" }}
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
