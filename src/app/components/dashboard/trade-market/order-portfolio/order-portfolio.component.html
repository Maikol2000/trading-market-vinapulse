<div
  class="bg-neutral-900 p-4 sm:p-6 lg:px-8 rounded-lg shadow-md text-gray-200"
>
  <!-- <h2 class="mb-4">
    {{ "TRADE.WATCHLIST.TITLE" | translate }}
  </h2> -->
  <div class="flex justify-between mb-4">
    <div class="flex space-x-4">
      <button
        (click)="setActiveTab(orderStatus.OPEN)"
        [class.bg-yellow-500]="activeTab() === orderStatus.OPEN"
        [class.text-black]="activeTab() === orderStatus.OPEN"
        [class.bg-gray-700]="activeTab() !== orderStatus.OPEN"
        class="px-4 py-2 rounded"
      >
        Mở
      </button>
      <button
        (click)="setActiveTab(orderStatus.ClOSED)"
        [class.bg-yellow-500]="activeTab() === orderStatus.ClOSED"
        [class.text-black]="activeTab() === orderStatus.ClOSED"
        [class.bg-gray-700]="activeTab() !== orderStatus.ClOSED"
        class="px-4 py-2 rounded"
      >
        Đã đóng
      </button>
      <button
        (click)="setActiveTab(orderStatus.PENDING)"
        [class.bg-yellow-500]="activeTab() === orderStatus.PENDING"
        [class.text-black]="activeTab() === orderStatus.PENDING"
        [class.bg-gray-700]="activeTab() !== orderStatus.PENDING"
        class="px-4 py-2 rounded"
      >
        Đang chờ
      </button>
    </div>
  </div>
  <div class="overflow-x-auto">
    <table class="min-w-full">
      <thead>
        <tr class="bg-gray-800">
          @for (header of headers; track $index) {
          <th class="p-2 text-left">
            {{ header.label | translate }}
          </th>
          }
        </tr>
      </thead>
      <tbody>
        <tr
          *ngFor="let order of filteredOrders()"
          class="border-b border-gray-700 hover:bg-gray-700"
        >
          <td class="p-2">
            {{ order.symbol }}
          </td>
          <td class="p-2">
            <span
              [ngClass]="{
                'text-red-500': order.side === orderSide.SELL,
                'text-blue-500': order.side === orderSide.BUY
              }"
            >
              {{ order.side }}
            </span>
          </td>
          <td class="p-2 text-left">{{ order.quantity }}</td>

          <td class="p-2">
            {{ order.openPrice ? (order.openPrice | number : "1.2-2") : "-" }}
          </td>
          <td
            class="p-2"
            [ngClass]="{
              'text-green-500': +order.stopLoss >= 0,
              'text-red-500': +order.takeProfit < 0
            }"
          >
            {{ +order.stopLoss >= 0 ? "+" : ""
            }}{{ +order.takeProfit | number : "1.2-2" }}
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
