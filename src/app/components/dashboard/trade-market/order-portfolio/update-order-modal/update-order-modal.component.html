<app-modal title="Quản lý lệnh giao dịch" (closed)="onClose()">
  <div class="bg-neutral-900">
    <div class="px-4 py-3 border-b border-gray-800">
      <div class="flex items-center justify-between text-gray-400">
        <div>
          <span>BTC</span>
          <span class="ml-1">{{ order.volume }} lô</span>
        </div>
        <p
          [ngClass]="
            profitLoss && profitLoss < 0 ? 'text-red-500' : 'text-green-500'
          "
        >
          {{ profitLoss }}
        </p>
      </div>
      <div class="flex items-center justify-between text-gray-400">
        <p class="text-sm">
          <span class="text-red-500">Bán</span> ở mức giá {{ order.openPrice }}
        </p>
        <p class="text-gray-300">{{ order.currentPrice }}</p>
      </div>
    </div>

    <!-- Tabs -->
    <div class="flex border-b border-gray-800">
      <button
        (click)="setActiveTab('edit')"
        class="px-4 py-2 text-sm font-medium text-gray-400"
        [ngClass]="activeTab === 'edit' ? 'border-b-2 border-yellow-500' : ''"
      >
        Sửa đổi
      </button>
      <button
        (click)="setActiveTab('closePartial')"
        class="px-4 py-2 text-sm font-medium text-gray-400"
        [ngClass]="
          activeTab === 'closePartial' ? 'border-b-2 border-yellow-500' : ''
        "
      >
        Đóng một phần
      </button>
    </div>

    <!-- Content based on active tab -->
    <!-- Edit Form (Tab 1) -->
    <div *ngIf="activeTab === 'edit'" class="p-4 text-gray-400">
      <!-- Chốt lời -->
      <div class="mb-4">
        <div class="flex justify-between text-sm mb-1">
          <span>Chốt lời</span>
        </div>

        <div class="flex items-center">
          <div class="flex-1 bg-gray-800 rounded-l flex items-center">
            <input
              type="text"
              [(ngModel)]="takeProfit"
              class="bg-transparent w-full px-3 py-2 focus:outline-none"
              placeholder="Chưa thiết lập"
            />
            <button
              *ngIf="takeProfit"
              (click)="clearInput('takeProfit')"
              class="text-gray-500 px-2 text-xl"
            >
              &times;
            </button>
          </div>
          <div class="bg-gray-800 px-3 py-2">Giá</div>
          <button
            (click)="adjustValue('takeProfit', false)"
            class="bg-gray-800 px-3 py-2"
          >
            −
          </button>
          <button
            (click)="adjustValue('takeProfit', true)"
            class="bg-gray-800 rounded-r px-3 py-2"
          >
            +
          </button>
        </div>
      </div>

      <!-- Cắt lỗ -->
      <div class="mb-4">
        <div class="flex justify-between text-sm mb-1">
          <span>Cắt lỗ</span>
        </div>

        <div class="flex items-center">
          <div class="flex-1 bg-gray-800 rounded-l flex items-center">
            <input
              type="text"
              [(ngModel)]="stopLoss"
              placeholder="Chưa thiết lập"
              class="bg-transparent w-full px-3 py-2 text-gray-500 focus:outline-none"
            />
            <button
              *ngIf="stopLoss"
              (click)="clearInput('stopLoss')"
              class="text-gray-500 px-2 text-xl hover:text-gray-500"
            >
              &times;
            </button>
          </div>
          <div class="bg-gray-800 px-3 py-2">Giá</div>
          <button
            (click)="adjustValue('stopLoss', false)"
            class="bg-gray-800 px-3 py-2"
          >
            −
          </button>
          <button
            (click)="adjustValue('stopLoss', true)"
            class="bg-gray-800 rounded-r px-3 py-2"
          >
            +
          </button>
        </div>
      </div>

      <button
        (click)="updateOrder()"
        class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-semibold py-3 px-4 rounded"
      >
        Sửa đổi lệnh giao dịch
      </button>
    </div>

    <!-- Close Partial Form (Tab 2) -->
    <div *ngIf="activeTab === 'closePartial'" class="p-4 text-gray-400">
      <div class="mb-4">
        <div class="flex justify-between text-sm mb-1">
          <span>Khối lượng để đóng</span>
        </div>

        <div class="flex items-center">
          <div class="flex-1 bg-gray-800 rounded-l flex items-center">
            <input
              type="text"
              [(ngModel)]="closeVolume"
              class="bg-transparent w-full px-3 py-2 focus:outline-none"
              [min]="0.01"
              placeholder="Chưa thiết lập"
            />
          </div>
          <div class="bg-gray-800 px-3 py-2">lô</div>
          <button
            (click)="adjustValue('closeVolume', false)"
            class="bg-gray-800 px-3 py-2"
          >
            −
          </button>
          <button
            (click)="adjustValue('closeVolume', true)"
            class="bg-gray-800 rounded-r px-3 py-2"
          >
            +
          </button>
        </div>
      </div>

      <button
        (click)="closePartialOrder()"
        class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-semibold py-3 px-4 rounded mb-3"
      >
        Đóng lệnh giao dịch
      </button>

      <div class="text-center">
        <p class="text-sm">Thua lỗ ước tính:</p>
        <p class="text-red-500">{{ estimatedProfit }} USD</p>
      </div>
    </div>
  </div>
</app-modal>
